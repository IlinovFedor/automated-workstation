services:
  oapi-gen-go:
    image: golang:1.25.4-alpine
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache git &&
        go install github.com/deepmap/oapi-codegen/v2/cmd/oapi-codegen@v2.2.0 &&
        oapi-codegen --config /workspace/openapi/go-config.yaml /workspace/openapi/openapi.yaml
        chown ${CURRENT_UID}:${CURRENT_GID} /workspace/backend/internal/api/server.go
    profiles: ["codegen"]

  oapi-gen-cpp:
    user: "${CURRENT_UID}:${CURRENT_GID}"
    image: openapitools/openapi-generator-cli:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: generate -c /workspace/openapi/cpp-config.yaml
    profiles: ["codegen"]

  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    restart: unless-stopped
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    expose:
      - ${POSTGRES_PORT}
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    env_file:
      - .env
    build:
      context: backend
      target: migrate-builder
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'goose -dir /src/migrations postgres
      "postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@$$POSTGRES_HOST:$$POSTGRES_PORT/$$POSTGRES_DB?sslmode=disable" up'

  backend:
    env_file:
      - .env
    build:
      context: backend
      target: final
    expose:
      - ${BACKEND_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend-build:
    build:
      context: frontend
    volumes:
      - frontend-dist:/dist
    restart: "no"

  nginx:
    image: nginx:alpine
    env_file:
      - .env
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    volumes:
      - frontend-dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      - NGINX_ENVSUBST_TEMPLATE_VARS=NGINX_PORT,BACKEND_PORT
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped

volumes:
  db-data:
  frontend-dist:
